<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turbo Video Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8f9fa; font-family: sans-serif; }
    </style>
</head>
<body>
    <nav class="bg-white border-b px-6 py-4 flex justify-between items-center">
        <div class="font-bold text-xl text-gray-800">▶ Turbo Downloader</div>
    </nav>

    <main class="max-w-4xl mx-auto mt-20 text-center px-4">
        <h1 class="text-4xl font-bold mb-4 text-gray-800">YouTube Video Downloader</h1>
        <p class="text-gray-500 mb-10">High-quality video downloads in seconds.</p>

        <form method="POST" class="relative max-w-2xl mx-auto">
            <input type="text" name="url" placeholder="Paste link here..." 
                class="w-full pl-6 pr-40 py-5 rounded-full border shadow-sm outline-none focus:border-red-400">
            <button type="submit" class="absolute right-2 top-2 bottom-2 bg-red-500 text-white px-8 rounded-full font-bold">
                Download
            </button>
        </form>

        {% if video_info %}
            <div class="mt-10 bg-white p-6 rounded-xl shadow-lg inline-block border text-left">
                {% if video_info.error %}
                    <p class="text-red-500">{{ video_info.error }}</p>
                {% else %}
                    <img src="{{ video_info.thumbnail }}" class="w-80 rounded-lg mb-4">
                    <h3 class="font-bold mb-4 w-80 truncate">{{ video_info.title }}</h3>
                    <a href="{{ video_info.url }}" target="_blank" class="block text-center bg-green-500 text-white py-3 rounded-lg font-bold">
                        Download Now
                    </a>
                {% endif %}
            </div>
        {% endif %}
    </main>
</body>
</html>
